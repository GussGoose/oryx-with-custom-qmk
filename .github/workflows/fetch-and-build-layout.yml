name: Build Voyager Firmware

on:
  workflow_dispatch:
    inputs:
      oryx_url:
        description: "Paste full Oryx layout URL"
        required: true
        default: "https://configure.zsa.io/voyager/layouts/bqbpg/EeaXpQ/0"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse Oryx URL
        id: parse
        run: |
          url="${{ github.event.inputs.oryx_url }}"

          layout=$(echo "$url" | awk -F'/' '{print $(NF-2)}')
          revision=$(echo "$url" | awk -F'/' '{print $(NF-1)}')
          geometry=$(echo "$url" | awk -F'/' '{print $(NF-3)}')

          echo "layout=$layout" >> $GITHUB_OUTPUT
          echo "revision=$revision" >> $GITHUB_OUTPUT
          echo "geometry=$geometry" >> $GITHUB_OUTPUT
          echo "local_layout_id=${layout}_${revision}" >> $GITHUB_OUTPUT

      - name: Download layout metadata
        id: metadata
        run: |
          layout="${{ steps.parse.outputs.layout }}"
          revision="${{ steps.parse.outputs.revision }}"
          geometry="${{ steps.parse.outputs.geometry }}"

          response=$(curl --silent --location https://oryx.zsa.io/graphql \
          --header 'Content-Type: application/json' \
          --data "{\"query\":\"query getLayout(\$hashId:String!,\$revisionId:String!,\$geometry:String){layout(hashId:\$hashId,geometry:\$geometry,revisionId:\$revisionId){revision{hashId qmkVersion title}}}\",\"variables\":{\"hashId\":\"$layout\",\"revisionId\":\"$revision\",\"geometry\":\"$geometry\"}}")

          hash=$(echo "$response" | jq -r '.data.layout.revision.hashId')
          firmware=$(echo "$response" | jq -r '.data.layout.revision.qmkVersion')

          firmware=$(printf "%.0f" "$firmware")

          echo "hash=$hash" >> $GITHUB_OUTPUT
          echo "firmware=$firmware" >> $GITHUB_OUTPUT

      - name: Download Oryx source
        run: |
          curl -L https://oryx.zsa.io/source/${{ steps.metadata.outputs.hash }} -o source.zip

      - name: Extract source
        run: |
          mkdir layout
          unzip -oj source.zip '*_source/*' -d layout
          rm source.zip

      - name: Apply custom files
        run: |
          geometry="${{ steps.parse.outputs.geometry }}"

          cp custom/${geometry}/config.h layout/config.h
          cp custom/${geometry}/rules.mk layout/rules.mk
          cp custom/${geometry}/custom_behavior.c layout/custom_behavior.c

          sed -i '1i #include "custom_behavior.c"' layout/keymap.c

      - name: Checkout QMK
        run: |
          git clone https://github.com/zsa/qmk_firmware.git
          cd qmk_firmware
          git checkout firmware${{ steps.metadata.outputs.firmware }}

      - name: Move layout into QMK
        run: |
          geometry="${{ steps.parse.outputs.geometry }}"
          layout_id="${{ steps.parse.outputs.local_layout_id }}"

          mkdir -p qmk_firmware/keyboards/zsa/${geometry}/keymaps/${layout_id}
          cp layout/* qmk_firmware/keyboards/zsa/${geometry}/keymaps/${layout_id}/

      - name: Build firmware
        run: |
          docker run -v $PWD/qmk_firmware:/root qmkfm/qmk_cli /bin/sh -c "
          qmk setup zsa/qmk_firmware -y &&
          make zsa/${{ steps.parse.outputs.geometry }}:${{ steps.parse.outputs.local_layout_id }}
          "

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: voyager_firmware
          path: qmk_firmware/*.uf2
