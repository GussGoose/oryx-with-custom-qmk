name: Fetch and build layout

on:
  workflow_dispatch:
    inputs:
      layout_id:
        description: "Layout id available in URL https://configure.zsa.io/voyager/layouts/[ID_IS_HERE]/latest"
        required: true
        default: "bqbpg/EeaXpQ"
      layout_geometry:
        description: "Keyboard type"
        type: choice
        options:
          - voyager
          - moonlander/reva
          - moonlander/revb
          - ergodox_ez
          - ergodox_ez/m32u4/glow
          - ergodox_ez/m32u4/shine
          - ergodox_ez/stm32
          - ergodox_ez/stm32/glow
          - ergodox_ez/stm32/shine
          - planck_ez
          - planck_ez/glow
        default: voyager

permissions:
  contents: write

jobs:
  fetch-and-build-layout:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository with full history
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Configure git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      - name: Ensure oryx branch exists
        run: |
          git fetch origin main oryx || true

          if git show-ref --verify --quiet refs/remotes/origin/oryx; then
            git checkout -B oryx origin/oryx
          else
            git checkout -B oryx origin/main
            git push -u origin oryx
          fi

      - name: Download layout source
        id: download-layout-source
        run: |
          layout_id='${{ github.event.inputs.layout_id }}'
          local_layout_id="$(echo "$layout_id" | sed 's/\//_/g')"

          response=$(curl --location 'https://oryx.zsa.io/graphql' \
            --header 'Content-Type: application/json' \
            --data "{\"query\":\"query getLayout(\$hashId: String!, \$revisionId: String!, \$geometry: String) {layout(hashId: \$hashId, geometry: \$geometry, revisionId: \$revisionId) { revision { hashId, qmkVersion, title }}}\",\"variables\":{\"hashId\":\"$layout_id\",\"geometry\":\"${{ github.event.inputs.layout_geometry }}\",\"revisionId\":\"latest\"}}" \
            | jq '.data.layout.revision | [.hashId, .qmkVersion, .title]')

          hash_id=$(echo "${response}" | jq -r '.[0]')
          firmware_version=$(printf "%.0f" "$(echo "${response}" | jq -r '.[1]')")
          change_description=$(echo "${response}" | jq -r '.[2]')

          if [[ -z "${hash_id}" || "${hash_id}" == "null" ]]; then
            echo "Failed to resolve layout hash from Oryx"
            echo "${response}"
            exit 1
          fi

          if [[ -z "${change_description}" || "${change_description}" == "null" ]]; then
            change_description="latest layout modification made with Oryx"
          fi

          curl -L "https://oryx.zsa.io/source/${hash_id}" -o source.zip

          echo "firmware_version=${firmware_version}" >> "$GITHUB_OUTPUT"
          echo "change_description=${change_description}" >> "$GITHUB_OUTPUT"
          echo "hash_id=${hash_id}" >> "$GITHUB_OUTPUT"
          echo "local_layout_id=${local_layout_id}" >> "$GITHUB_OUTPUT"

      - name: Unzip the source file
        run: |
          rm -rf "${{ steps.download-layout-source.outputs.local_layout_id }}"
          mkdir -p "${{ steps.download-layout-source.outputs.local_layout_id }}"
          unzip -oj source.zip '*_source/*' -d "${{ steps.download-layout-source.outputs.local_layout_id }}"
          rm source.zip

      - name: Commit and push Oryx changes to oryx branch
        env:
          CHANGE_DESCRIPTION: ${{ steps.download-layout-source.outputs.change_description }}
        run: |
          git checkout oryx
          git add .
          git commit -m "✨(oryx): ${CHANGE_DESCRIPTION}" || echo "No layout change"
          git push origin HEAD:oryx

      - name: Merge oryx into main
        run: |
          git fetch origin main oryx
          git checkout -B main origin/main
          git merge -Xignore-all-space origin/oryx
          git push origin HEAD:main

      - name: Update QMK firmware submodule to target version
        run: |
          git submodule update --init --remote --depth=1 --no-single-branch
          cd qmk_firmware
          git fetch origin
          git checkout -B firmware${{ steps.download-layout-source.outputs.firmware_version }} origin/firmware${{ steps.download-layout-source.outputs.firmware_version }}
          git submodule update --init --recursive
          cd ..
          git add qmk_firmware
          git commit -m "✨(qmk): Update firmware" || echo "No QMK change"
          git push origin HEAD:main

      - name: Build qmk docker image
        run: docker build -t qmk .

      - name: Build the layout
        id: build-layout
        run: |
          if [ "${{ steps.download-layout-source.outputs.firmware_version }}" -ge 24 ]; then
            keyboard_directory="qmk_firmware/keyboards/zsa"
            make_prefix="zsa/"
          else
            keyboard_directory="qmk_firmware/keyboards"
            make_prefix=""
          fi

          local_layout_id="${{ steps.download-layout-source.outputs.local_layout_id }}"

          rm -rf "${keyboard_directory}/${{ github.event.inputs.layout_geometry }}/keymaps/${local_layout_id}"
          mkdir -p "${keyboard_directory}/${{ github.event.inputs.layout_geometry }}/keymaps"
          cp -r "${local_layout_id}" "${keyboard_directory}/${{ github.event.inputs.layout_geometry }}/keymaps/"

          docker run -v ./qmk_firmware:/root --rm qmk /bin/sh -c "
            qmk setup zsa/qmk_firmware -b firmware${{ steps.download-layout-source.outputs.firmware_version }} -y
            make ${make_prefix}${{ github.event.inputs.layout_geometry }}:${local_layout_id}
          "

          normalized_layout_geometry="$(echo "${{ github.event.inputs.layout_geometry }}" | sed 's/\//_/g')"

          built_layout_file="$(find ./qmk_firmware -maxdepth 1 -type f -regex ".*${normalized_layout_geometry}.*\.\(bin\|hex\|uf2\)$" | head -n 1)"

          if [[ -z "${built_layout_file}" ]]; then
            echo "No built firmware artifact found."
            exit 1
          fi

          echo "built_layout_file=${built_layout_file}" >> "$GITHUB_OUTPUT"
          echo "normalized_layout_geometry=${normalized_layout_geometry}" >> "$GITHUB_OUTPUT"

      - name: Upload layout
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build-layout.outputs.normalized_layout_geometry }}_${{ steps.download-layout-source.outputs.local_layout_id }}
          path: ${{ steps.build-layout.outputs.built_layout_file }}
