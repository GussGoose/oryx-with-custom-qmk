name: Build Voyager Firmware

on:
  workflow_dispatch:
    inputs:
      oryx_url:
        description: "Paste full Oryx layout URL"
        required: true
        default: "https://configure.zsa.io/voyager/layouts/bqbpg/EeaXpQ/0"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Parse Oryx URL
        id: parse
        run: |
          url="${{ github.event.inputs.oryx_url }}"
          path="$(echo "$url" | sed -E 's#https?://[^/]+/##' | sed 's#/$##')"

          geometry="$(echo "$path" | cut -d'/' -f1)"
          section="$(echo "$path" | cut -d'/' -f2)"
          layout="$(echo "$path" | cut -d'/' -f3)"
          revision="$(echo "$path" | cut -d'/' -f4)"

          if [ "$section" != "layouts" ]; then
            echo "Unexpected Oryx URL format: $url"
            exit 1
          fi

          if [ -z "$geometry" ] || [ -z "$layout" ] || [ -z "$revision" ]; then
            echo "Failed to parse Oryx URL: $url"
            exit 1
          fi

          echo "geometry=$geometry" >> "$GITHUB_OUTPUT"
          echo "layout=$layout" >> "$GITHUB_OUTPUT"
          echo "revision=$revision" >> "$GITHUB_OUTPUT"
          echo "local_layout_id=${layout}_${revision}" >> "$GITHUB_OUTPUT"

      - name: Download layout metadata
        id: metadata
        run: |
          layout="${{ steps.parse.outputs.layout }}"
          revision="${{ steps.parse.outputs.revision }}"
          geometry="${{ steps.parse.outputs.geometry }}"

          response=$(curl --silent --show-error --location 'https://oryx.zsa.io/graphql' \
            --header 'Content-Type: application/json' \
            --data "{\"query\":\"query getLayout(\$hashId:String!,\$revisionId:String!,\$geometry:String){layout(hashId:\$hashId,geometry:\$geometry,revisionId:\$revisionId){revision{hashId qmkVersion title}}}\",\"variables\":{\"hashId\":\"$layout\",\"revisionId\":\"$revision\",\"geometry\":\"$geometry\"}}")

          echo "$response"

          hash=$(echo "$response" | jq -r '.data.layout.revision.hashId')
          firmware_raw=$(echo "$response" | jq -r '.data.layout.revision.qmkVersion')

          if [ -z "$hash" ] || [ "$hash" = "null" ]; then
            echo "Failed to fetch revision hash from Oryx."
            exit 1
          fi

          if [ -z "$firmware_raw" ] || [ "$firmware_raw" = "null" ]; then
            echo "Failed to fetch firmware version from Oryx."
            exit 1
          fi

          firmware=$(printf "%.0f" "$firmware_raw")

          echo "hash=$hash" >> "$GITHUB_OUTPUT"
          echo "firmware=$firmware" >> "$GITHUB_OUTPUT"

      - name: Download Oryx source
        run: |
          curl -L "https://oryx.zsa.io/source/${{ steps.metadata.outputs.hash }}" -o source.zip

      - name: Extract source
        run: |
          rm -rf layout
          mkdir -p layout
          unzip -oj source.zip '*_source/*' -d layout
          rm source.zip
          ls -la layout

      - name: Apply custom files
        run: |
          geometry="${{ steps.parse.outputs.geometry }}"

          test -f "custom/${geometry}/config.h"
          test -f "custom/${geometry}/rules.mk"
          test -f "custom/${geometry}/custom_behavior.c"

          cp "custom/${geometry}/config.h" layout/config.h
          cp "custom/${geometry}/rules.mk" layout/rules.mk
          cp "custom/${geometry}/custom_behavior.c" layout/custom_behavior.c

          sed -i '1i #include "custom_behavior.c"' layout/keymap.c

          python3 <<'PY'
          from pathlib import Path

          p = Path("layout/keymap.c")
          text = p.read_text()

          marker = "bool process_record_user(uint16_t keycode, keyrecord_t *record) {\n"
          injection = marker + "  if (!custom_process_record_user(keycode, record)) { return false; }\n"

          if marker not in text:
              raise SystemExit("Could not find process_record_user signature in generated keymap.c")

          text = text.replace(marker, injection, 1)
          p.write_text(text)
          PY

          echo "Injected custom behavior into generated keymap.c"
          grep -n "custom_process_record_user" layout/keymap.c || true

      - name: Checkout QMK
        run: |
          git clone --depth 1 --branch "firmware${{ steps.metadata.outputs.firmware }}" --recurse-submodules https://github.com/zsa/qmk_firmware.git

      - name: Move layout into QMK
        run: |
          geometry="${{ steps.parse.outputs.geometry }}"
          layout_id="${{ steps.parse.outputs.local_layout_id }}"

          mkdir -p "qmk_firmware/keyboards/zsa/${geometry}/keymaps/${layout_id}"
          cp layout/* "qmk_firmware/keyboards/zsa/${geometry}/keymaps/${layout_id}/"
          ls -la "qmk_firmware/keyboards/zsa/${geometry}/keymaps/${layout_id}"

      - name: Build firmware
        run: |
          docker run --rm -v "$PWD/qmk_firmware:/root" qmkfm/qmk_cli /bin/sh -c "
            cd /root &&
            make zsa/${{ steps.parse.outputs.geometry }}:${{ steps.parse.outputs.local_layout_id }}
          "

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware_${{ steps.parse.outputs.local_layout_id }}
          path: |
            qmk_firmware/*.uf2
            qmk_firmware/*.bin
            qmk_firmware/*.hex
